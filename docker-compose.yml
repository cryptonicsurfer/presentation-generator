services:
  presentation-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: presentation-generator
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.local

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/models').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - presentation-network
      - postgres_default

networks:
  presentation-network:
    driver: bridge
  postgres_default:
    external: true
