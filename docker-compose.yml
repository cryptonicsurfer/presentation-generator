services:
  presentation-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: presentation-generator
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.local

    restart: unless-stopped

    healthcheck:
      # Probe the unauthenticated root. /api/* is gated behind Directus auth and
      # returns 401, so treat "server responds without a 5xx" as healthy — a 307
      # auth-redirect means the app is up. Only connection errors / 5xx fail.
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r => process.exit(r.status < 500 ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - presentation-network
      - postgres_default

networks:
  presentation-network:
    driver: bridge
  postgres_default:
    external: true
